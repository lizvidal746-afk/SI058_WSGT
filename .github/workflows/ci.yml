name: CI Performance Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Code & Data Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high

      - name: CSV Validation
        run: npm run data:validate

      - name: Linter (Biome)
        run: npm run lint

      - name: Markdown Lint
        run: npm run lint:md || true

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  audit:
    needs: validate
    uses: ./.github/workflows/audit.yml
    with: {}
    secrets: inherit
  collapse:
    needs: audit
    uses: ./.github/workflows/collapse.yml
    with: {}
    secrets: inherit
