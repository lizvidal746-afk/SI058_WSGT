// .github/workflows/audit.yml
name: 📊 Performance Audits

on:
  workflow_call:
    inputs: {}
    secrets: inherit

jobs:
  run-audit:
    runs-on: windows-latest
    strategy:
      matrix:
        scenario: [grados, carnet]
    env:
      BASE_URL: ${{ secrets.SUNEDU_WSGT_BASE_URL }}
      SUNEDU_WSGT_GRADOS_ENDPOINT: ${{ secrets.SUNEDU_WSGT_GRADOS_ENDPOINT }}
      SUNEDU_WSGT_CARNET_ENDPOINT: ${{ secrets.SUNEDU_WSGT_CARNET_ENDPOINT }}
      OLLAMA_ENDPOINT: ${{ secrets.OLLAMA_ENDPOINT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install k6 (Chocolatey)
        run: choco install k6 -y

      - name: Run k6 audit via composite action
        uses: ./.github/actions/run-k6
        with:
          script: scripts/${{ matrix.scenario }}.js

      - name: Extract metrics
        run: node extract-k6-metrics.js

      - name: Generate Excel report
        run: node generar-excel.js

      - name: Generate Word report
        run: node generar-word.js

      - name: Publish artifacts via composite action
        uses: ./.github/actions/publish-artifacts
        with:
          name: audit-${{ matrix.scenario }}
          path: |
            reports/**/*.html
            *.xlsx
            *.docx
            metrics_for_ai.json
